spring:
  application:
    name: care-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}
  server:
    servlet:
      context-path: /api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:care}
        envers:
          enable: true
          autoRegisterListeners: true
          storeDataAtDelete: true
        format_sql: true
        show_sql: true
    database: postgresql

    springdoc:
      swagger-ui:
        enabled: true
      api-docs:
        enabled: true

logging:
  level:
    root: INFO
    org:
      springframework:
        web: DEBUG
        orm: DEBUG
        jdbc: DEBUG
      hibernate:
        SQL: DEBUG
        type: DEBUG

kind: Application
