spring:
  application:
    name: care-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:care}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:care}
        format_sql: true
        show_sql: true
        envers:
          enable: true
          autoRegisterListeners: true
          storeDataAtDelete: true

# ⚠️ Correção de Indentação: O springdoc e security devem ficar na raiz, e não dentro do spring.jpa!
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

security:
  jwt:
    secret-key: ${JWT_SECRET:minha-chave-secreta-para-desenvolvimento}
    expiration-size: 3600000
    open-urls:
      - /auth/**
      - /v3/api-docs/**
      - /swagger-ui/**

logging:
  level:
    root: INFO
    org:
      springframework:
        web: DEBUG
        orm: DEBUG
        jdbc: DEBUG
      hibernate:
        SQL: DEBUG
        type: DEBUG